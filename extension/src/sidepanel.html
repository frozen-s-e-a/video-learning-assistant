<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Video Learning Assistant</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8fafc;
        --panel: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --border: #e2e8f0;
        --primary: #2563eb;
        --danger: #dc2626;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-width: 320px;
        background: var(--bg);
        color: var(--text);
        font: 14px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main { padding: 16px; }
      section {
        margin: 0 0 14px;
        padding: 14px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--panel);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 22px;
        line-height: 1.2;
      }
      h2 { margin: 0 0 10px; font-size: 18px; line-height: 1.25; }
      h3 { margin: 12px 0 4px; font-size: 14px; line-height: 1.3; }
      p { margin: 0 0 8px; }
      ul { margin: 8px 0 0; padding-left: 20px; }
      textarea {
        display: block;
        width: 100%;
        min-height: 92px;
        margin: 8px 0 10px;
        padding: 10px;
        resize: vertical;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font: inherit;
      }
      textarea:focus {
        outline: 2px solid #bfdbfe;
        border-color: var(--primary);
      }
      button {
        min-height: 36px;
        padding: 0 12px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #ffffff;
        color: var(--text);
        cursor: pointer;
        font: inherit;
        font-weight: 650;
      }
      button:hover { background: #f1f5f9; }
      button:disabled { cursor: not-allowed; opacity: 0.6; }
      #ask {
        border-color: var(--primary);
        background: var(--primary);
        color: #ffffff;
      }
      #ask:hover { background: #1d4ed8; }
      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .muted { color: var(--muted); }
      .error { color: var(--danger); font-weight: 650; }
      #answer:empty,
      #followUp:empty { display: none; }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>Learning Assistant</h1>
        <div id="status" class="muted">No analysis yet.</div>
      </section>
      <section id="answer"></section>
      <section id="followUp"></section>
      <section>
        <label for="question">Follow-up question</label>
        <textarea id="question" placeholder="Ask about the current analysis..."></textarea>
        <div class="button-row">
          <button id="ask">Ask</button>
          <button id="selectRegion">Select region and analyze</button>
        </div>
      </section>
    </main>
    <script type="module" src="./sidepanel.js"></script>
  </body>
</html>
